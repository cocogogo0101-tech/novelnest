<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{NOVEL_TITLE}} — {{CHAPTER_TITLE}}</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header class="topbar"><h1>NovelNest</h1></header>
  <main class="container">
    <nav class="back"><a href="../index.html">⬅ العودة للرواية</a></nav>
    <article class="chapter">
      <h2>{{NOVEL_TITLE}} — {{CHAPTER_TITLE}}</h2>
      <article><p>{{CHAPTER_CONTENT}}</p></article>
    </article>
    <nav class="chapter-nav">
      <button {{PREV_DISABLED}} onclick="location.href='{{PREV_LINK}}'">⬅ السابق</button>
      <a href="../index.html">📚 الفصول</a>
      <button {{NEXT_DISABLED}} onclick="location.href='{{NEXT_LINK}}'">التالي ➡</button>
    </nav>
  </main>
  <footer class="footer"><small>صنع بواسطة: Sun King</small></footer>
  <script>
    // يبدّل توقيع الصانع حسب الثيم إن وُجد في localStorage على جهاز القارئ
    (function(){
      var theme = localStorage.getItem('novelnest_theme_v1') || 'light';
      var maker = theme === 'dark' ? 'Dark King' : 'Sun King';
      var footer = document.querySelector('.footer');
      if (footer) {
        var sm = footer.querySelector('small');
        if (sm) sm.textContent = 'صنع بواسطة: ' + maker;
        else footer.innerHTML = '<small>صنع بواسطة: ' + maker + '</small>';
      }
    })();
  </script>
</body>
</html>
